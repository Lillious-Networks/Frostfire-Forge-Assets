version: '3.8'

services:
  frostfire-assets-prod:
    build:
      context: ../../
      dockerfile: src/docker/Dockerfile.prod
    container_name: frostfire-assets-prod
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ../../.env.production
    networks:
      - frostfire-network-prod
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8000/health').then(r => process.exit(0)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  frostfire-network-prod:
    driver: bridge
