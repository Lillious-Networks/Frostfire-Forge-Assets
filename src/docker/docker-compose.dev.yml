services:
  frostfire-assets-dev:
    build:
      context: ../../
      dockerfile: src/docker/Dockerfile.dev
    container_name: frostfire-assets-dev
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ../../.env.development
    volumes:
      # For relative ASSETS_PATH: prepend ../../ to resolve from project root
      # For absolute ASSETS_PATH: use as-is (e.g., C:/Users/... or /mnt/...)
      - ${ASSETS_PATH}:/app/assets
    environment:
      # Override ASSETS_PATH to point to mounted volume inside container
      - ASSETS_PATH=/app/assets
    networks:
      - frostfire-network-dev

networks:
  frostfire-network-dev:
    driver: bridge