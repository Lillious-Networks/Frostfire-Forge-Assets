version: '3.8'

services:
  frostfire-assets-dev:
    build:
      context: ../../
      dockerfile: src/docker/Dockerfile.dev
    container_name: frostfire-assets-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../../.env.development
    networks:
      - frostfire-network-dev
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8000/health').then(r => process.exit(0)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  frostfire-network-dev:
    driver: bridge
